name: test-workflow
version: 1.0.0
description: A test workflow
author: dev
license: MIT

steps:
  - id: step1
    run: mock-agent
    input: "Generate a greeting"
  
  - id: step2
    condition: "steps.step1.output != ''"
    run: mock-agent
    input: "Evaluate this greeting: {{steps.step1.output}}"
    
outputs:
  greeting_eval: "{{steps.step2.output}}"
