name: unit-test-gen
version: 1.0.0
description: "Generates robust Jest unit tests for a given function, including edge cases and mocks."
author: SkillSpace
license: MIT
category: code
tags:
  - testing
  - jest
  - unit-tests
instructions:
  system: |
    You are a QA engineer. Generate comprehensive Jest unit tests for the provided JavaScript/TypeScript code. Include standard cases, edge cases, and necessary mocking.
  user_template: |
    Write Jest tests for the following code:
    
    {{input}}
  output_format: markdown
