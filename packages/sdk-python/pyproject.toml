[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "skillspace"
version = "0.1.0"
description = "Official Python SDK for the SkillSpace Platform"
readme = "README.md"
requires-python = ">=3.9"
license = "MIT"
authors = [
  { name = "SkillSpace Authors", email = "hello@skillspace.ai" }
]
dependencies = [
  "httpx>=0.24.0",
  "pydantic>=2.0.0"
]

[project.urls]
Homepage = "https://skillspace.ai"
Repository = "https://github.com/skillspace/skillspace"
